name: "Flake.lock: update Nix dependencies"
on:
  workflow_dispatch: # allows manual triggering
permissions: {}
jobs:
  nix-flake-update:
    name: "flake.lock update"
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: true
      - uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3.21.1
      - uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          commit-msg: "chore(deps): update Nix flake inputs"
          pr-title: "chore(deps): update Nix flake inputs"
          pr-labels: |-
            dependencies
            automated
