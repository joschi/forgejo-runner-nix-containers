name: "Flake.lock: update Nix dependencies"
on:
  workflow_dispatch: # allows manual triggering
permissions: {}
jobs:
  nix-flake-update:
    name: "flake.lock update"
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
      - uses: DeterminateSystems/determinate-nix-action@2be1df9ed6cfd12d52bfbba7af79472420fa5299 # v3.18.0
      - uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          commit-msg: "chore(deps): update Nix flake inputs"
          pr-title: "chore(deps): update Nix flake inputs"
          pr-labels: |-
            dependencies
            automated
